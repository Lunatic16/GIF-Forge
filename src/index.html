<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIF Forge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #08080e;
    --surface:   #0f0f1a;
    --surface2:  #161625;
    --border:    #1e1e35;
    --accent:    #ff3f6c;
    --accent2:   #ff8c42;
    --lime:      #b8ff3a;
    --text:      #e8e8f0;
    --muted:     #585870;
    --radius:    12px;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Syne', sans-serif; overflow: hidden; user-select: none;
  }

  /* ── Noise overlay ── */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.35;
  }

  /* ── Title bar ── */
  #titlebar {
    display: flex; align-items: center; justify-content: space-between;
    height: 42px; padding: 0 16px;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #titlebar .logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 800; letter-spacing: 0.06em;
  }
  #titlebar .logo span { color: var(--accent); }
  #titlebar .logo .dot { color: var(--lime); }
  #winbtns { display: flex; gap: 8px; -webkit-app-region: no-drag; }
  #winbtns button {
    width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer;
    transition: filter 0.15s;
  }
  #winbtns button:hover { filter: brightness(1.4); }
  #btn-close    { background: #ff5f57; }
  #btn-minimize { background: #febc2e; }

  /* ── Layout ── */
  #app {
    display: grid; grid-template-columns: 1fr 280px;
    height: calc(100vh - 42px); overflow: hidden;
  }

  /* ── Left panel ── */
  #left {
    display: flex; flex-direction: column; gap: 0;
    padding: 28px 28px 24px; overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  /* Drop zone */
  #dropzone {
    flex-shrink: 0;
    border: 2px dashed var(--border); border-radius: var(--radius);
    min-height: 170px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
    background: var(--surface);
  }
  #dropzone::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(255,63,108,0.07) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  #dropzone:hover::before, #dropzone.active::before { opacity: 1; }
  #dropzone:hover, #dropzone.active {
    border-color: var(--accent); background: rgba(255,63,108,0.04);
  }
  #dropzone .icon {
    font-size: 36px; line-height: 1;
    filter: drop-shadow(0 0 12px rgba(255,63,108,0.5));
  }
  #dropzone .label {
    font-size: 14px; font-weight: 700; letter-spacing: 0.05em; color: var(--text);
  }
  #dropzone .sublabel { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* File info bar */
  #file-info {
    display: none; margin-top: 12px; padding: 12px 16px;
    background: var(--surface2); border-radius: var(--radius);
    border: 1px solid var(--border);
    flex-direction: row; align-items: center; gap: 12px;
  }
  #file-info.visible { display: flex; }
  #file-info .file-icon { font-size: 22px; flex-shrink: 0; }
  #file-info .file-name {
    font-size: 12px; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }
  #file-info .file-change {
    margin-left: auto; flex-shrink: 0;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--accent); cursor: pointer; text-transform: uppercase;
  }
  #file-info .file-change:hover { text-decoration: underline; }

  /* Output row */
  #output-row {
    display: flex; align-items: center; gap: 10px; margin-top: 12px;
  }
  #output-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; padding: 9px 12px; outline: none; min-width: 0;
    transition: border-color 0.2s;
  }
  #output-row input:focus { border-color: var(--accent); }
  #output-row button {
    flex-shrink: 0; padding: 9px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--muted);
    font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700;
    cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s;
  }
  #output-row button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Section heading ── */
  .section-label {
    font-size: 10px; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin: 20px 0 10px;
  }

  /* Time range row */
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .field input[type="number"], .field input[type="text"] {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; padding: 8px 10px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .field input:focus { border-color: var(--accent); }

  /* ── Progress ── */
  #progress-wrap {
    margin-top: 20px; display: none; flex-direction: column; gap: 8px;
  }
  #progress-wrap.visible { display: flex; }
  .prog-label {
    display: flex; justify-content: space-between;
    font-size: 11px; font-weight: 600; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .prog-track {
    height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden;
  }
  .prog-bar {
    height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease; box-shadow: 0 0 8px rgba(255,63,108,0.6);
  }
  .prog-bar.indeterminate {
    width: 40% !important;
    animation: slide 1.4s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { margin-left: -40%; }
    100% { margin-left: 100%; }
  }

  /* ── Result banner ── */
  #result {
    display: none; margin-top: 14px; padding: 14px 16px;
    border-radius: var(--radius); border: 1px solid; flex-direction: column; gap: 6px;
  }
  #result.visible { display: flex; }
  #result.success { background: rgba(184,255,58,0.05); border-color: rgba(184,255,58,0.25); }
  #result.error   { background: rgba(255,63,108,0.05); border-color: rgba(255,63,108,0.25); }
  #result .res-title { font-size: 13px; font-weight: 800; }
  #result.success .res-title { color: var(--lime); }
  #result.error   .res-title { color: var(--accent); }
  #result .res-detail { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  #result .res-actions { display: flex; gap: 8px; margin-top: 4px; }
  #result .res-actions button {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; border: 1px solid;
    font-family: 'Syne', sans-serif; transition: all 0.2s;
  }
  #btn-open-folder {
    background: rgba(184,255,58,0.1); border-color: rgba(184,255,58,0.3); color: var(--lime);
  }
  #btn-open-folder:hover { background: rgba(184,255,58,0.2); }
  #btn-convert-again {
    background: transparent; border-color: var(--border); color: var(--muted);
  }
  #btn-convert-again:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Right panel ── */
  #right {
    display: flex; flex-direction: column; padding: 28px 20px 24px;
    gap: 0; overflow-y: auto;
    background: var(--surface);
  }

  /* Sliders */
  .slider-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .slider-header { display: flex; justify-content: space-between; align-items: baseline; }
  .slider-label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .slider-value { font-size: 13px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }

  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 3px;
    background: var(--border); border-radius: 99px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
    box-shadow: 0 0 0 0 rgba(255,63,108,0); transition: box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 4px rgba(255,63,108,0.25);
  }

  /* Pill toggles */
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 6px 12px; border-radius: 99px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    font-family: 'Syne', sans-serif; transition: all 0.2s;
  }
  .pill.active, .pill:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,63,108,0.08); }
  .pill.active { background: rgba(255,63,108,0.15); }

  /* Loop select */
  select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; padding: 8px 10px; outline: none;
    transition: border-color 0.2s; cursor: pointer;
  }
  select:focus { border-color: var(--accent); }

  /* ── Convert button ── */
  #btn-convert {
    margin-top: auto; padding-top: 20px;
  }
  #btn-convert button {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none; border-radius: var(--radius); cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800;
    letter-spacing: 0.08em; text-transform: uppercase; color: #fff;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  #btn-convert button:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,63,108,0.4); }
  #btn-convert button:active { transform: translateY(0); }
  #btn-convert button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  #btn-convert button::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>

<!-- Title bar -->
<div id="titlebar">
  <div class="logo">
    <span>GIF</span>FORGE<span class="dot">.</span>
  </div>
  <div id="winbtns">
    <button id="btn-close" title="Close"></button>
    <button id="btn-minimize" title="Minimize"></button>
  </div>
</div>

<div id="app">

  <!-- ── LEFT PANEL ── -->
  <div id="left">

    <!-- Drop zone -->
    <div id="dropzone">
      <div class="icon">⬡</div>
      <div class="label">Drop video or click to browse</div>
      <div class="sublabel">mp4 · mov · avi · mkv · webm · flv</div>
    </div>

    <!-- File info -->
    <div id="file-info">
      <div class="file-icon">🎬</div>
      <div class="file-name" id="file-name-label">—</div>
      <div class="file-change" id="file-change-btn">Change</div>
    </div>

    <!-- Output -->
    <div class="section-label">Output</div>
    <div id="output-row">
      <input id="output-path" type="text" placeholder="output.gif" readonly />
      <button id="btn-pick-output">Browse</button>
    </div>

    <!-- Time range -->
    <div class="section-label">Clip Range</div>
    <div class="time-row">
      <div class="field">
        <label>Start (sec)</label>
        <input type="number" id="inp-start" placeholder="0" min="0" step="0.1" />
      </div>
      <div class="field">
        <label>Duration (sec)</label>
        <input type="number" id="inp-duration" placeholder="Full" min="0.1" step="0.1" />
      </div>
    </div>

    <!-- Progress -->
    <div id="progress-wrap">
      <div class="prog-label">
        <span id="prog-phase">Analyzing…</span>
        <span id="prog-pct"></span>
      </div>
      <div class="prog-track"><div class="prog-bar indeterminate" id="prog-bar"></div></div>
    </div>

    <!-- Result -->
    <div id="result">
      <div class="res-title" id="res-title"></div>
      <div class="res-detail" id="res-detail"></div>
      <div class="res-actions" id="res-actions"></div>
    </div>

  </div>

  <!-- ── RIGHT PANEL ── -->
  <div id="right">

    <div class="section-label">Frame Rate</div>
    <div class="slider-field">
      <div class="slider-header">
        <span class="slider-label">FPS</span>
        <span class="slider-value" id="val-fps">15</span>
      </div>
      <input type="range" id="sld-fps" min="5" max="30" value="15" step="1" />
    </div>

    <div class="section-label">Width</div>
    <div class="slider-field">
      <div class="slider-header">
        <span class="slider-label">pixels</span>
        <span class="slider-value" id="val-width">480</span>
      </div>
      <input type="range" id="sld-width" min="120" max="1280" value="480" step="10" />
    </div>

    <div class="section-label">Quality</div>
    <div class="pill-group" style="margin-bottom:20px">
      <button class="pill" data-q="low">Low</button>
      <button class="pill active" data-q="medium">Medium</button>
      <button class="pill" data-q="high">High</button>
    </div>

    <div class="section-label">Loop</div>
    <select id="sel-loop" style="margin-bottom:20px">
      <option value="0">∞ Infinite</option>
      <option value="1">× 1 once</option>
      <option value="2">× 2 twice</option>
      <option value="3">× 3 times</option>
    </select>

    <div id="btn-convert">
      <button id="btn-go" disabled>Convert to GIF</button>
    </div>

  </div>
</div>

<script>
let inputFile  = null;
let outputFile = null;
let converting = false;

const $ = id => document.getElementById(id);

// Window controls
$('btn-close').onclick    = () => window.api.windowClose();
$('btn-minimize').onclick = () => window.api.windowMinimize();

// FPS slider
$('sld-fps').oninput = e => { $('val-fps').textContent = e.target.value; };

// Width slider
$('sld-width').oninput = e => { $('val-width').textContent = e.target.value + 'px'; };

// Quality pills
document.querySelectorAll('.pill[data-q]').forEach(pill => {
  pill.onclick = () => {
    document.querySelectorAll('.pill[data-q]').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
  };
});

// Pick video
async function pickVideo() {
  const file = await window.api.pickVideo();
  if (!file) return;
  setInputFile(file);
}

function setInputFile(file) {
  inputFile = file;
  const name = file.split(/[\\/]/).pop();
  $('file-name-label').textContent = name;
  $('file-info').classList.add('visible');

  // Auto-set output
  const base = file.replace(/\.[^.]+$/, '');
  outputFile = base + '.gif';
  $('output-path').value = outputFile;

  updateConvertBtn();
  hideResult();
}

$('dropzone').onclick = pickVideo;
$('file-change-btn').onclick = pickVideo;

// Drag and drop
const dz = $('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
dz.addEventListener('dragleave', () => dz.classList.remove('active'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) setInputFile(file.path);
});

// Pick output
$('btn-pick-output').onclick = async () => {
  const def = $('output-path').value || 'output.gif';
  const f = await window.api.pickOutput(def);
  if (f) { outputFile = f; $('output-path').value = f; }
};

function updateConvertBtn() {
  $('btn-go').disabled = !inputFile || converting;
}

function hideResult() {
  $('result').className = 'result';
  $('result').style.display = '';
}

// Convert
$('btn-go').onclick = async () => {
  if (!inputFile || converting) return;
  converting = true;
  updateConvertBtn();
  hideResult();

  const fps      = parseInt($('sld-fps').value);
  const width    = parseInt($('sld-width').value);
  const quality  = document.querySelector('.pill.active[data-q]').dataset.q;
  const loop     = parseInt($('sel-loop').value);
  const start    = $('inp-start').value ? parseFloat($('inp-start').value) : null;
  const duration = $('inp-duration').value ? parseFloat($('inp-duration').value) : null;
  const output   = $('output-path').value || inputFile.replace(/\.[^.]+$/, '') + '.gif';

  // show progress
  const pw = $('progress-wrap');
  pw.classList.add('visible');
  $('prog-bar').classList.add('indeterminate');
  $('prog-phase').textContent = 'Generating palette…';
  $('prog-pct').textContent = '';

  // listen for progress
  window.api.onProgress(({ phase }) => {
    $('prog-phase').textContent = phase === 'palette' ? 'Generating palette…' : 'Rendering GIF…';
  });

  const result = await window.api.convert({ input: inputFile, output, fps, width, quality, loop, start, duration });

  pw.classList.remove('visible');
  converting = false;
  updateConvertBtn();

  const el = $('result');
  if (result.success) {
    el.className = 'visible success';
    $('res-title').textContent = '✓ GIF created!';
    $('res-detail').textContent = `${result.output.split(/[\\/]/).pop()} · ${result.sizeMB} MB`;
    $('res-actions').innerHTML = `
      <button id="btn-open-folder" class="res-actions button">Show in Folder</button>
      <button id="btn-convert-again" class="res-actions button">Convert Another</button>
    `;
    $('btn-open-folder').onclick  = () => window.api.showInFolder(result.output);
    $('btn-convert-again').onclick = () => {
      inputFile = null; outputFile = null;
      $('file-info').classList.remove('visible');
      $('output-path').value = '';
      hideResult();
      updateConvertBtn();
    };
  } else {
    el.className = 'visible error';
    $('res-title').textContent  = '✗ Conversion failed';
    $('res-detail').textContent = result.error;
    $('res-actions').innerHTML  = '';
  }
  el.style.display = 'flex';
};
</script>
</body>
</html>
